<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Photography — Sign²Art</title>
<link rel="stylesheet" href="style.css">
<style>.hero-bg-weddings{background-image:url('images/wedding/amg_8553.jpg');}</style>
</head>
<body>

<div class="service-page-hero">
  <div class="service-page-hero-bg hero-bg-weddings"></div>
  <div class="service-page-hero-overlay"></div>
  <div class="service-page-hero-content">
    <a class="back-link" href="index.html#services">← Back to Services</a>
    <h1 class="service-page-title">Wedding Photography</h1>
    <p class="service-page-sub">Timeless moments · Love stories · Celebrations of life</p>
  </div>
</div>

<div class="service-page-body">

  <div class="service-event fade-up">
    <h2>Wedding Gallery</h2>
    <p>Every wedding tells a unique love story. Through careful observation and the perfect moment, we capture the emotions, details, and joy that make your day unforgettable.</p>
    <div class="masonry" id="weddingGrid"></div>
  </div>

</div>

<script src="nav.js"></script>
<script>
const imgs = [
  'images/wedding/amg_8180-2.jpg',
  'images/wedding/amg_8201.jpg',
  'images/wedding/amg_8288-2.jpg',
  'images/wedding/amg_8339.jpg',
  'images/wedding/amg_8369.jpg',
  'images/wedding/amg_8402.jpg',
  'images/wedding/amg_8439.jpg',
  'images/wedding/amg_8446.jpg',
  'images/wedding/amg_8447.jpg',
  'images/wedding/amg_8459.jpg',
  'images/wedding/amg_8486.jpg',
  'images/wedding/amg_8534.jpg',
  'images/wedding/amg_8549.jpg',
  'images/wedding/amg_8553.jpg',
  'images/wedding/amg_8575.jpg',
  'images/wedding/amg_8583.jpg',
  'images/wedding/dsc08350.jpg',
  'images/wedding/dsc08365-2.jpg',
  'images/wedding/dsc08440-2.jpg',
  'images/wedding/_dsc3755.jpg',
  'images/wedding/_dsc3770.jpg',
  'images/wedding/_dsc3797.jpg',
];

const g = document.getElementById('weddingGrid');
imgs.forEach((src, idx) => {
  const d = document.createElement('div'); d.className = 'thumb';
  d.innerHTML = '<img src="' + src + '" loading="lazy" alt="Wedding photo"><div class="thumb-overlay"><div class="zoom-icon">⤢</div></div>';
  d.onclick = () => openLB(imgs, idx);
  g.appendChild(d);
});
</script>
</body>
</html>
