<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food & Products — Sign²Art</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="service-page-hero">
  <div class="service-page-hero-bg" style="background-image:url('https://static.wixstatic.com/media/6cead5_a6fcd51b8aa04d69929868ec47a300b6f000.jpg/v1/fill/w_1600,h_800,q_85,enc_avif,quality_auto/6cead5_a6fcd51b8aa04d69929868ec47a300b6f000.jpg')"></div>
  <div class="service-page-hero-overlay"></div>
  <div class="service-page-hero-content">
    <a class="back-link" href="index.html#services">← Back to Services</a>
    <h1 class="service-page-title">Food &amp; Products</h1>
    <p class="service-page-sub">Commercial photography · Food styling · Product shoots</p>
  </div>
</div>

<div class="service-page-body">
  <div class="service-video fade-up">
    <video controls muted loop playsinline style="width:100%;max-height:560px;object-fit:cover;display:block;background:#000;">
      <source src="videos/food.mp4" type="video/mp4">
    </video>
  </div>
  <div class="service-event fade-up">
    <h2>Food &amp; Product Gallery</h2>
    <p>Capturing the beauty of food and products through light, composition and creative styling — making every subject irresistible to the eye.</p>
    <div class="masonry" id="foodGrid"></div>
  </div>
</div>

<script src="nav.js"></script>
<script>
const imgs = [
  'https://static.wixstatic.com/media/6cead5_a6fcd51b8aa04d69929868ec47a300b6f000.jpg/v1/fill/w_800,h_600,q_90,enc_avif,quality_auto/6cead5_a6fcd51b8aa04d69929868ec47a300b6f000.jpg',
  'https://static.wixstatic.com/media/6cead5_5d4108199ac64f33ac304c0a7226bc15f000.jpg/v1/fill/w_800,h_600,q_90,enc_avif,quality_auto/6cead5_5d4108199ac64f33ac304c0a7226bc15f000.jpg',
  'https://static.wixstatic.com/media/6cead5_d95fecdd1a9640389bd9df78870c4595~mv2.jpg/v1/fill/w_800,h_1080,q_90,enc_avif,quality_auto/6cead5_d95fecdd1a9640389bd9df78870c4595~mv2.jpg',
  'https://static.wixstatic.com/media/6cead5_65b2800e01674e9a8708e0564d2af379~mv2_d_4000_6000_s_4_2.jpg/v1/fill/w_800,h_1200,q_90,enc_avif,quality_auto/6cead5_65b2800e01674e9a8708e0564d2af379~mv2_d_4000_6000_s_4_2.jpg',
  'https://static.wixstatic.com/media/6cead5_50c3e44fd4d14a7caa870ad85f1c636b~mv2_d_5670_3780_s_4_2.jpg/v1/fill/w_800,h_533,q_90,enc_avif,quality_auto/6cead5_50c3e44fd4d14a7caa870ad85f1c636b~mv2_d_5670_3780_s_4_2.jpg',
];

const g = document.getElementById('foodGrid');
imgs.forEach((src, idx) => {
  const d = document.createElement('div'); d.className = 'thumb';
  d.innerHTML = `<img src="${src}" loading="lazy" alt="Food photo"><div class="thumb-overlay"><div class="zoom-icon">⤢</div></div>`;
  d.onclick = () => openLB(imgs, idx);
  g.appendChild(d);
});
</script>
</body>
</html>
